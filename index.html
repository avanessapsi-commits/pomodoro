<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pomodoro - Arquitetura Materna</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  html, body {
    height: 100%;
  }
  
  body {
    font-family: 'Inter', sans-serif;
    background: #4D1D2B;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 12px;
  }
  
  .container {
    background: #6B2E42;
    padding: clamp(16px, 4vw, 28px);
    width: 100%;
    max-width: 95vw;
    max-height: 95vh;
  }
  
  .config-panel {
    background: rgba(245, 230, 224, 0.05);
    border: 1px solid rgba(212, 181, 171, 0.3);
    border-radius: 6px;
    padding: clamp(10px, 2vw, 14px);
    margin-bottom: clamp(12px, 3vw, 18px);
  }

  .config-title {
    font-size: clamp(8px, 2vw, 10px);
    color: #D4B5AB;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    font-weight: 700;
    margin-bottom: clamp(6px, 1vw, 8px);
  }

  input {
    width: 100%;
    background: rgba(245, 230, 224, 0.08);
    border: 1px solid #D4B5AB;
    color: #F5E6E0;
    padding: clamp(5px, 1vw, 7px);
    border-radius: 3px;
    font-size: clamp(8px, 1.5vw, 10px);
    font-family: 'Inter', sans-serif;
    margin-bottom: clamp(4px, 1vw, 6px);
  }

  input::placeholder {
    color: #D4B5AB;
    opacity: 0.6;
  }

  .config-btn {
    background: transparent;
    border: 1px solid #D4B5AB;
    color: #D4B5AB;
    padding: clamp(4px, 1vw, 6px) clamp(8px, 2vw, 12px);
    border-radius: 3px;
    cursor: pointer;
    font-size: clamp(7px, 1.5vw, 9px);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    font-family: 'Inter', sans-serif;
    transition: all 0.2s;
  }

  .config-btn:hover {
    background: rgba(212, 181, 171, 0.1);
    border-color: #F5E6E0;
    color: #F5E6E0;
  }

  .status-sync {
    font-size: clamp(7px, 1.5vw, 8px);
    color: #E8D4CA;
    margin-top: clamp(4px, 1vw, 6px);
  }

  .timer-display {
    text-align: center;
    margin-bottom: clamp(12px, 2vw, 16px);
  }
  
  .timer-number {
    font-size: clamp(40px, 12vw, 56px);
    font-weight: 700;
    color: #F5E6E0;
    line-height: 1;
    font-variant-numeric: tabular-nums;
    letter-spacing: -2px;
  }
  
  .status-line {
    font-size: clamp(8px, 2vw, 10px);
    color: #D4B5AB;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    font-weight: 700;
    margin-top: clamp(4px, 1vw, 6px);
  }
  
  .controls {
    display: flex;
    gap: clamp(6px, 1.5vw, 10px);
    justify-content: center;
    margin: clamp(12px, 2vw, 16px) 0;
    flex-wrap: wrap;
  }
  
  button {
    background: transparent;
    border: 1px solid #D4B5AB;
    color: #F5E6E0;
    padding: clamp(6px, 1.5vw, 8px) clamp(10px, 2vw, 16px);
    border-radius: 3px;
    cursor: pointer;
    font-size: clamp(8px, 1.5vw, 10px);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    font-family: 'Inter', sans-serif;
    transition: all 0.2s;
  }
  
  button:hover {
    background: rgba(245, 230, 224, 0.1);
    border-color: #F5E6E0;
  }
  
  button:active {
    transform: scale(0.95);
  }
  
  .info-row {
    display: flex;
    gap: clamp(15px, 3vw, 24px);
    justify-content: center;
    margin: clamp(10px, 2vw, 14px) 0;
    flex-wrap: wrap;
  }
  
  .info-item {
    text-align: center;
  }
  
  .info-label {
    font-size: clamp(7px, 1.5vw, 9px);
    color: #D4B5AB;
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 600;
    margin-bottom: clamp(2px, 0.5vw, 4px);
  }
  
  .info-value {
    font-size: clamp(13px, 3vw, 16px);
    color: #F5E6E0;
    font-weight: 700;
  }
  
  .settings {
    display: flex;
    gap: clamp(4px, 1vw, 8px);
    justify-content: center;
    margin-top: clamp(10px, 2vw, 14px);
    padding-top: clamp(10px, 2vw, 14px);
    border-top: 1px solid rgba(245, 230, 224, 0.1);
    flex-wrap: wrap;
  }
  
  .time-preset {
    background: transparent;
    border: 1px solid #D4B5AB;
    color: #D4B5AB;
    padding: clamp(3px, 0.8vw, 5px) clamp(6px, 1.5vw, 10px);
    border-radius: 2px;
    cursor: pointer;
    font-size: clamp(7px, 1.5vw, 9px);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    font-family: 'Inter', sans-serif;
    transition: all 0.2s;
  }
  
  .time-preset:hover {
    background: rgba(212, 181, 171, 0.1);
    border-color: #F5E6E0;
    color: #F5E6E0;
  }
  
  .time-preset.active {
    background: rgba(245, 230, 224, 0.2);
    border-color: #F5E6E0;
    color: #F5E6E0;
  }

  .history-btn {
    width: 100%;
    margin-top: clamp(10px, 2vw, 14px);
    padding-top: clamp(10px, 2vw, 14px);
    border-top: 1px solid rgba(245, 230, 224, 0.1);
  }

  .modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.8);
    z-index: 1000;
    justify-content: center;
    align-items: center;
    padding: 12px;
  }

  .modal.active {
    display: flex;
  }

  .modal-content {
    background: #6B2E42;
    border: 1px solid #D4B5AB;
    border-radius: 8px;
    padding: clamp(14px, 3vw, 20px);
    max-width: 95vw;
    max-height: 80vh;
    overflow-y: auto;
    width: 100%;
  }

  .modal-header {
    font-size: clamp(9px, 2vw, 12px);
    color: #D4B5AB;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    font-weight: 700;
    margin-bottom: clamp(10px, 2vw, 14px);
  }

  .modal-item {
    font-size: clamp(8px, 1.5vw, 10px);
    color: #E8D4CA;
    padding: clamp(4px, 1vw, 6px) 0;
    border-bottom: 1px solid rgba(245, 230, 224, 0.05);
  }

  .modal-item:last-child {
    border-bottom: none;
  }

  .modal-actions {
    display: flex;
    gap: clamp(6px, 1.5vw, 10px);
    margin-top: clamp(10px, 2vw, 14px);
    flex-wrap: wrap;
  }

  .modal-actions button {
    flex: 1;
    min-width: 80px;
  }
</style>
</head>
<body>

<div class="container">
  <div class="config-panel">
    <div class="config-title">Configuração Notion</div>
    <input type="password" id="apiKey" placeholder="Cole sua API Key aqui" />
    <button class="config-btn" id="saveConfigBtn">Salvar</button>
    <div class="status-sync" id="syncStatus">Offline</div>
  </div>

  <div class="timer-display">
    <div class="timer-number" id="timerDisplay">25:00</div>
    <div class="status-line" id="statusText">PAUSADO - TRABALHO</div>
  </div>
  
  <div class="controls">
    <button id="startBtn">Iniciar</button>
    <button id="pauseBtn">Pausar</button>
    <button id="resetBtn">Reset</button>
  </div>
  
  <div class="info-row">
    <div class="info-item">
      <div class="info-label">Ciclos</div>
      <div class="info-value" id="cycles">0</div>
    </div>
    <div class="info-item">
      <div class="info-label">Tempo Total</div>
      <div class="info-value" id="totalTime">0m</div>
    </div>
  </div>
  
  <div class="settings">
    <button class="time-preset active" data-work="25">25</button>
    <button class="time-preset" data-work="20">20</button>
    <button class="time-preset" data-work="15">15</button>
    <button class="time-preset" data-work="10">10</button>
    <button class="time-preset" data-work="5">5</button>
  </div>

  <button class="history-btn" id="historyBtn">Ver Histórico Notion</button>
</div>

<div class="modal" id="historyModal">
  <div class="modal-content">
    <div class="modal-header">Histórico (Notion)</div>
    <div id="historyContent"></div>
    <div class="modal-actions">
      <button id="deleteHistoryBtn">Deletar Tudo</button>
      <button id="closeModalBtn">Fechar</button>
    </div>
  </div>
</div>

<script>
let workDuration = 25 * 60;
let breakDuration = 5 * 60;
let timeLeft = workDuration;
let isRunning = false;
let isWorkPhase = true;
let completedCycles = 0;
let totalTimeSpent = 0;
let timerInterval = null;

const NOTION_DATABASE_ID = '0483ff059e7440f48dbb232973118b28';
let notionApiKey = localStorage.getItem('notionApiKey') || '';

const apiKeyInput = document.getElementById('apiKey');
const saveConfigBtn = document.getElementById('saveConfigBtn');
const syncStatus = document.getElementById('syncStatus');

const startBtn = document.getElementById('startBtn');
const pauseBtn = document.getElementById('pauseBtn');
const resetBtn = document.getElementById('resetBtn');
const timerDisplay = document.getElementById('timerDisplay');
const statusText = document.getElementById('statusText');
const cyclesDisplay = document.getElementById('cycles');
const totalTimeDisplay = document.getElementById('totalTime');
const presets = document.querySelectorAll('.time-preset');
const historyBtn = document.getElementById('historyBtn');
const historyModal = document.getElementById('historyModal');
const historyContent = document.getElementById('historyContent');
const deleteHistoryBtn = document.getElementById('deleteHistoryBtn');
const closeModalBtn = document.getElementById('closeModalBtn');

function updateDisplay() {
  const minutes = Math.floor(timeLeft / 60);
  const seconds = timeLeft % 60;
  timerDisplay.textContent = `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
  
  const phase = isWorkPhase ? 'TRABALHO' : 'PAUSA';
  const state = isRunning ? 'RODANDO' : 'PAUSADO';
  statusText.textContent = `${state} - ${phase}`;
}

function playNotification() {
  try {
    const audioContext = new (window.AudioContext || window.webkitAudioContext)();
    const oscillator = audioContext.createOscillator();
    const gain = audioContext.createGain();
    
    oscillator.connect(gain);
    gain.connect(audioContext.destination);
    
    oscillator.frequency.value = isWorkPhase ? 800 : 600;
    oscillator.type = 'sine';
    
    gain.gain.setValueAtTime(0.3, audioContext.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);
    
    oscillator.start(audioContext.currentTime);
    oscillator.stop(audioContext.currentTime + 0.5);
  } catch (e) {
    console.log('Áudio não suportado');
  }
}

async function saveToNotion(type) {
  if (!notionApiKey) {
    syncStatus.textContent = 'API Key não configurada';
    return;
  }

  const data = {
    parent: { database_id: NOTION_DATABASE_ID },
    properties: {
      title: {
        title: [{ text: { content: `Pomodoro - ${type}` } }]
      },
      Tipo: {
        select: { name: type === 'work' ? 'Trabalho' : 'Pausa' }
      },
      Hora: {
        date: { start: new Date().toISOString() }
      },
      Duração: {
        number: type === 'work' ? workDuration / 60 : breakDuration / 60
      },
      Status: {
        select: { name: 'Concluído' }
      }
    }
  };

  try {
    const response = await fetch('https://api.notion.com/v1/pages', {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${notionApiKey}`,
        'Content-Type': 'application/json',
        'Notion-Version': '2022-06-28'
      },
      body: JSON.stringify(data)
    });

    if (response.ok) {
      syncStatus.textContent = '✓ Sincronizado';
      setTimeout(() => {
        syncStatus.textContent = '✓ Conectado';
      }, 2000);
    } else {
      syncStatus.textContent = '✗ Erro na sincronização';
    }
  } catch (error) {
    console.error('Erro:', error);
    syncStatus.textContent = '✗ Sem conexão';
  }
}

async function loadHistory() {
  if (!notionApiKey) {
    historyContent.innerHTML = '<div class="modal-item">Configure API Key primeiro</div>';
    return;
  }

  try {
    const response = await fetch('https://api.notion.com/v1/databases/' + NOTION_DATABASE_ID + '/query', {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${notionApiKey}`,
        'Content-Type': 'application/json',
        'Notion-Version': '2022-06-28'
      }
    });

    if (response.ok) {
      const data = await response.json();
      const results = data.results.slice(0, 30);
      
      if (results.length === 0) {
        historyContent.innerHTML = '<div class="modal-item">Nenhum pomodoro registrado</div>';
      } else {
        historyContent.innerHTML = results.map(item => {
          const props = item.properties;
          const tipo = props.Tipo?.select?.name || 'N/A';
          const hora = new Date(props.Hora?.date?.start || '').toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
          return `<div class="modal-item">• ${hora} - ${tipo}</div>`;
        }).join('');
      }
    } else {
      historyContent.innerHTML = '<div class="modal-item">Erro ao carregar</div>';
    }
  } catch (error) {
    historyContent.innerHTML = '<div class="modal-item">Erro ao carregar histórico</div>';
  }
}

async function deleteAllNotionHistory() {
  if (!notionApiKey) return;

  try {
    const response = await fetch('https://api.notion.com/v1/databases/' + NOTION_DATABASE_ID + '/query', {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${notionApiKey}`,
        'Content-Type': 'application/json',
        'Notion-Version': '2022-06-28'
      }
    });

    if (response.ok) {
      const data = await response.json();
      
      for (const item of data.results) {
        await fetch('https://api.notion.com/v1/pages/' + item.id, {
          method: 'PATCH',
          headers: {
            'Authorization': `Bearer ${notionApiKey}`,
            'Notion-Version': '2022-06-28'
          },
          body: JSON.stringify({ archived: true })
        });
      }
      
      await loadHistory();
      syncStatus.textContent = '✓ Histórico limpo';
    }
  } catch (error) {
    console.error('Erro ao deletar:', error);
  }
}

function startTimer() {
  if (isRunning) return;
  isRunning = true;
  
  timerInterval = setInterval(() => {
    timeLeft--;
    totalTimeSpent++;
    updateDisplay();
    updateTotalTime();
    
    if (timeLeft <= 0) {
      playNotification();
      saveToNotion(isWorkPhase ? 'work' : 'break');
      
      if (isWorkPhase) {
        completedCycles++;
        cyclesDisplay.textContent = completedCycles;
        isWorkPhase = false;
        timeLeft = breakDuration;
      } else {
        isWorkPhase = true;
        timeLeft = workDuration;
      }
      updateDisplay();
    }
  }, 1000);
}

function pauseTimer() {
  isRunning = false;
  clearInterval(timerInterval);
  updateDisplay();
}

function resetTimer() {
  isRunning = false;
  clearInterval(timerInterval);
  isWorkPhase = true;
  timeLeft = workDuration;
  updateDisplay();
}

function updateTotalTime() {
  const hours = Math.floor(totalTimeSpent / 3600);
  const minutes = Math.floor((totalTimeSpent % 3600) / 60);
  
  if (hours > 0) {
    totalTimeDisplay.textContent = `${hours}h ${minutes}m`;
  } else {
    totalTimeDisplay.textContent = `${minutes}m`;
  }
}

saveConfigBtn.addEventListener('click', () => {
  notionApiKey = apiKeyInput.value;
  localStorage.setItem('notionApiKey', notionApiKey);
  syncStatus.textContent = '✓ Conectado';
  apiKeyInput.value = '';
});

presets.forEach(preset => {
  preset.addEventListener('click', () => {
    if (isRunning) return;
    
    presets.forEach(p => p.classList.remove('active'));
    preset.classList.add('active');
    
    const newDuration = parseInt(preset.dataset.work) * 60;
    workDuration = newDuration;
    timeLeft = newDuration;
    isWorkPhase = true;
    
    updateDisplay();
  });
});

startBtn.addEventListener('click', startTimer);
pauseBtn.addEventListener('click', pauseTimer);
resetBtn.addEventListener('click', resetTimer);
historyBtn.addEventListener('click', () => {
  loadHistory();
  historyModal.classList.add('active');
});
closeModalBtn.addEventListener('click', () => {
  historyModal.classList.remove('active');
});
deleteHistoryBtn.addEventListener('click', () => {
  if (confirm('Tem certeza que quer deletar TUDO?')) {
    deleteAllNotionHistory();
  }
});

if (notionApiKey) {
  syncStatus.textContent = '✓ Conectado';
} else {
  syncStatus.textContent = 'Configure API Key';
}

updateDisplay();
</script>

</body>
</html>
